name: Twitter to Discord Bot

on:
  schedule:
    - cron: '*/5 * * * *' # 每 5 分鐘執行一次
  workflow_dispatch: # 允許你手動點擊測試

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允許機器人把紀錄檔寫回儲存庫

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Python script
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      run: python main.py

    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add last_tweet.txt
        # 如果有新推文導致檔案變更，就 commit 並 push 存檔
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update last tweet record" && git push)
